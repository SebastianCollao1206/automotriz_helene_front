<div class="h-screen flex items-center justify-center lg:py-20 py-10 md:py-15 px-6 lg:px-20 md:px-13 bg-slate-100">
    <div
        class="bg-white rounded-2xl lg:max-w-4xl md:max-w-xl sm:max-w-lg w-full overflow-hidden shadow-2xl border border-zinc-200">
        <div class="grid lg:grid-cols-2 grid-cols-1">
            <div class="bg-gradient-to-l from-blue-400 to-blue-800 p-8 lg:p-12 lg:flex items-center hidden">
                <div class="text-center">
                    <img src="assets/IMG/inicio_sesion.png" alt="img_login" class="object-cover img-fluid" />
                </div>
            </div>
            <div class="p-8 lg:p-10">
                <div class="text-center mb-10">
                    <h1 class="texto-titulo font-bold mb-4">
                        Iniciar Sesión
                    </h1>
                    <p class="text-zinc-600 texto-pequeño">
                        Ingresa tus credenciales para continuar
                    </p>
                </div>

                <form [formGroup]="formularioLogin" (ngSubmit)="onSubmit()" class="gap-7 flex flex-col">
                    <div>
                        <label class="label-formulario texto-pequeño">
                            Correo electrónico 
                        </label>
                        <div class="relative">
                            <input type="email" formControlName="email"
                                [class]="validacionFormulario.obtenerClasesCampo(formularioLogin, 'email') + ' pr-12'"
                                placeholder="ejemplo@gmail.com">
                            <i class="fas fa-envelope texto-pequeño icono-input"></i>
                        </div>
                        <p *ngIf="validacionFormulario.esCampoInvalido(formularioLogin, 'email')"
                            class="mt-1 text-xs text-red-500">
                            {{ validacionFormulario.obtenerMensajeError(formularioLogin, 'email', 'El correo') }}
                        </p>
                    </div>

                    <div>
                        <label class="label-formulario texto-pequeño">
                            Contraseña 
                        </label>
                        <div class="relative">
                            <input [type]="verPassword ? 'text' : 'password'" formControlName="password"
                                [class]="validacionFormulario.obtenerClasesCampo(formularioLogin, 'password')"
                                placeholder="•••••••">
                            <button type="button" (click)="toggleVerPassword()"
                                class="icono-input hover:text-zinc-500 transition-colors duration-300">
                                <i class="texto-pequeño fas" [ngClass]="verPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                            </button>
                        </div>
                        <p *ngIf="validacionFormulario.esCampoInvalido(formularioLogin, 'password')"
                            class="mt-1 text-xs text-red-500">
                            {{ validacionFormulario.obtenerMensajeError(formularioLogin, 'password', 'La contraseña') }}
                        </p>
                    </div>

                    <div class="flex items-center justify-between text-center">
                        <label class="flex items-center">
                            <input type="checkbox" formControlName="recordarme"
                                class="w-4 h-4 text-blue-600 bg-zinc-700 border-zinc-600 rounded">
                            <span class="ml-2 texto-pequeño text-zinc-600">Recordarme</span>
                        </label>

                        <a href="#"
                            class="texto-pequeño text-blue-500 hover:text-blue-700 transition-colors duration-300">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <button type="submit" [disabled]="formularioLogin.invalid || enviando"
                        [class]="formularioLogin.invalid || enviando ? 'btn btn-azul opacity-50 cursor-not-allowed' : 'btn btn-azul'">
                        {{ enviando ? 'Ingresando...' : 'Ingresar' }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
