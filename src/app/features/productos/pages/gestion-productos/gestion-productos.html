<div class="container p-5 mx-auto">
    <div class="flex justify-center">
        <h2 class="texto-grande">{{ modoEdicion ? 'Editar Producto' : 'Agregar Producto' }}</h2>
    </div>

    <div *ngIf="cargandoDatos" class="flex justify-center items-center p-12">
        <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
        <span class="ml-4 texto-intermedio text-zinc-600">Cargando datos...</span>
    </div>

    <app-productos-form *ngIf="!cargandoDatos" [modoEdicion]="modoEdicion" [productoId]="productoId"
        [productoData]="productoData" (alEnviarFormulario)="alCrearProducto($event)"
        (alActualizarFormulario)="alActualizarProducto($event)">
    </app-productos-form>
</div>
