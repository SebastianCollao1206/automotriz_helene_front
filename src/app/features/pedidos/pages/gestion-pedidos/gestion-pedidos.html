<div class="container p-5 mx-auto">
    <div class="flex justify-center">
        <h2 class="texto-grande">{{ modoEdicion ? 'Editar Pedido' : 'Agregar Pedido' }}</h2>
    </div>

    <div *ngIf="cargandoDatos" class="flex justify-center items-center p-12">
        <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
        <span class="ml-4 texto-intermedio text-zinc-600">Cargando datos...</span>
    </div>

    <app-pedidos-form *ngIf="!cargandoDatos" [modoEdicion]="modoEdicion" [pedidoId]="pedidoId" [pedidoData]="pedidoData"
        (alEnviarFormulario)="alCrearPedido($event)" (alActualizarFormulario)="alActualizarPedido($event)">
    </app-pedidos-form>
</div>
