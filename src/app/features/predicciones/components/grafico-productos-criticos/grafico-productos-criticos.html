<div class="bg-white rounded-xl border border-zinc-200 shadow-lg p-6 h-full">
    <div class="mb-5">
        <h3 class="texto-mediano font-semibold text-zinc-800 mb-1">
            <i class="fas fa-chart-pie mr-2 text-red-600"></i>
            Distribución de Acciones
        </h3>
        <p class="texto-chico text-zinc-500">
            Clasificación de productos por tipo de acción requerida
        </p>
    </div>

    <div *ngIf="!hayDatos" class="flex flex-col justify-center items-center py-16">
        <i class="fas fa-info-circle text-4xl text-zinc-400 mb-3"></i>
        <span class="texto-pequeño text-zinc-600">No hay datos disponibles</span>
    </div>

    <div *ngIf="hayDatos" class="w-full flex justify-center items-center" style="height: 350px;">
        <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType">
        </canvas>
    </div>
</div>
