<div class="bg-white rounded-xl border border-zinc-200 shadow-lg p-6 h-full">
    <div class="mb-5">
        <h3 class="texto-mediano font-semibold text-zinc-800 mb-1">
            <i class="fas fa-chart-line mr-2 text-blue-600"></i>
            Tendencia General del Inventario
        </h3>
        <p class="texto-chico text-zinc-500">
            Comportamiento global de productos histórico vs predicción
        </p>
    </div>

    <div *ngIf="cargandoDatos" class="flex flex-col justify-center items-center py-16">
        <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-3"></i>
        <span class="texto-pequeño text-zinc-600">Cargando datos...</span>
    </div>

    <div *ngIf="!cargandoDatos && datosGrafico" class="w-full" style="height: 350px;">
        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="lineChartType">
        </canvas>
    </div>

    <div *ngIf="!cargandoDatos && !datosGrafico" class="flex flex-col justify-center items-center py-16">
        <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-3"></i>
        <span class="texto-pequeño text-zinc-600">No se pudieron cargar los datos</span>
    </div>
</div>
