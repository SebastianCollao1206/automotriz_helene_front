<nav class=" w-full flex justify-between px-6 md:px-10 py-5 items-center border-b border-zinc-200">

    <div class="lg:hidden">
        <img src="assets/IMG/logo.png" alt="Logo" class="h-10">
    </div>

    <button (click)="onToggleSidebar()"
        class="hidden cursor-pointer lg:flex items-center justify-center md:w-9 md:h-9 w-7 h-7 rounded-lg border border-zinc-200 hover:bg-zinc-200 transition-colors">
        <i class="fas fa-align-left texto-pequeño text-zinc-600"></i>
    </button>

    <div class="flex items-center gap-6">
        <button (click)="toggleNotifications()"
            class="cursor-pointer relative inline-flex items-center justify-center md:w-9 md:h-9 w-7 h-7 rounded-full border border-zinc-200 hover:bg-zinc-200 transition-colors">
            <i class="fas fa-bell texto-pequeño text-zinc-600"></i>
            <span class="absolute -top-2 -right-2 flex items-center justify-center md:w-5 md:h-5 
                w-4 h-4 text-[8px] md:text-[10px] lg:text-xs font-medium text-white bg-red-500 rounded-full">
                3
            </span>
        </button>

        <button (click)="onToggleSidebar()"
            class="lg:hidden cursor-pointer flex items-center justify-center md:w-9 md:h-9 w-7 h-7 rounded-lg border border-zinc-200 hover:bg-zinc-200 transition-colors">
            <i class="fas fa-align-left texto-pequeño text-zinc-600"></i>
        </button>

        <!-- Panel lateral de notificaciones -->
        <div *ngIf="isNotificationsOpen"
            class="absolute top-20 right-3 w-88 bg-white rounded-xl shadow-2xl  border border-zinc-200 overflow-y-auto z-50 max-h-120">

            <div class="flex justify-between items-center p-4 px-8 border-b border-zinc-200 sticky top-0">
                <h3 class="font-semibold ">Notificaciones</h3>
                <button (click)="closeNotifications()" class="cursor-pointer text-zinc-500 hover:text-zinc-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="divide-y divide-zinc-200 p-2">
                <div *ngFor="let i of [1,2,3,4,5]"
                    class="p-4 hover:bg-zinc-200/60 cursor-pointer transition-colors hover:rounded-2xl">
                    <div class="flex gap-3">
                        <i class="fas fa-circle text-blue-500 text-xs mt-1.5"></i>
                        <div class="flex-1">
                            <p class="font-semibold text-sm text-zinc-900">Nueva solicitud</p>
                            <p class="text-xs text-zinc-600 mt-1">Tienes una nueva solicitud de servicio.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Overlay para cerrar -->
        <div *ngIf="isNotificationsOpen" (click)="closeNotifications()" class="fixed inset-0 z-40"></div>

        <div class="hidden lg:block border-l border-zinc-300 h-8"></div>

        <div class="hidden lg:flex items-center space-x-2 md:space-x-4">
            <div class="text-left">
                <p class="texto-pequeño">Sebastian Collao Salas</p>
                <p class="texto-chico text-zinc-500">Administrador</p>
            </div>

            <img src="https://www.pngkey.com/png/full/12-123249_teacher-teacher-login.png" alt="Avatar"
                class="md:w-9 md:h-9 w-7 h-7 rounded-full">

            <button (click)="toggleLogout()" class="flex items-center justify-center">
                <i class="fas fa-chevron-down text-zinc-500 texto-pequeño"></i>
            </button>
        </div>
        <div *ngIf="isLogoutOpen"
            class="absolute top-20 right-3 w-45 bg-white rounded-xl shadow-2xl border border-zinc-200 z-50">
            <button
                class="w-full text-left texto-pequeño px-6 rounded-xl py-3 hover:bg-zinc-200/60 transition-colors text-red-500">
                <i class="fa-solid fa-right-from-bracket mx-2"></i> Cerrar Sesión
            </button>
        </div>
    </div>
</nav>
<div *ngIf="isLogoutOpen" (click)="closeLogout()" class="fixed inset-0 z-40"></div>
