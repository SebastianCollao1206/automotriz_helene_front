<main class="">
    <article>
        <section>
            <div class="flex bg-white">
                <!-- Sidebar Desktop -->
                <div [class.w-25]="sidebarCollapsed" [class.w-55]="!sidebarCollapsed"
                    class="hidden lg:block transition-all duration-300 p-3 h-screen sticky top-0">
                    <app-sidebar [collapsed]="sidebarCollapsed"></app-sidebar>
                </div>

                <!-- Sidebar Mobile (overlay) -->
                <div *ngIf="mobileSidebarOpen" class="lg:hidden fixed inset-0 z-50 flex" (click)="closeMobileSidebar()">
                    <div class="w-100 h-full p-3 bg-zinc-700/40" (click)="$event.stopPropagation()">
                        <app-sidebar [collapsed]="false" (close)="closeMobileSidebar()"></app-sidebar>
                    </div>
                    <div class="flex-1 bg-zinc-700/40 "></div>
                </div>

                <div class="flex-1 flex flex-col min-w-0">
                    <app-header (toggleSidebar)="toggleSidebar()" class="px-3"></app-header>

                    <div class="overflow-y-auto">
                        <router-outlet></router-outlet>
                    </div>
                </div>
            </div>
        </section>
    </article>
</main>
