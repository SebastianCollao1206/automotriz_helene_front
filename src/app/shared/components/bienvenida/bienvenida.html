<div class="container mx-auto p-6 lg:p-10">
    <div class="max-w-6xl mx-auto">
        <!-- Header de bienvenida -->
        <div class="bg-gradient-to-r from-blue-800 to-blue-600 rounded-2xl p-8 lg:p-10 text-white shadow-xl mb-8">
            <div class="flex items-center justify-between flex-wrap gap-6">
                <div>
                    <h1 class="texto-titulo font-bold mb-2">
                        ¡Bienvenido, {{ nombreUsuario }}!
                    </h1>
                    <p class="texto-intermedio">
                        {{ rolPrincipal }} - Sistema de Gestión
                    </p>
                </div>
                <div class="flex items-center gap-4">
                    <img src="assets/IMG/reconocimiento.jpg"
                        class="w-20 h-20 lg:w-30 lg:h-30 rounded-full shadow-lg object-cover">
                </div>
            </div>
        </div>

        <!-- Accesos rápidos -->
        <div class="mb-8">
            <h2 class="texto-intermedio font-semibold mb-6 text-zinc-700">
                Accesos Rápidos
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <a *ngFor="let item of accesosRapidos" [routerLink]="item.route"
                    class="bg-white rounded-xl p-6 shadow-md hover:shadow-xl transition-all duration-300 border border-zinc-200 hover:border-blue-400 cursor-pointer group">
                    <div class="flex items-start gap-4">
                        <div
                            class="w-12 h-12 rounded-lg bg-blue-100 flex items-center justify-center group-hover:bg-blue-600 transition-colors">
                            <i [class]="item.icon + ' text-blue-600 group-hover:text-white transition-colors'"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="texto-normal font-semibold mb-1 text-zinc-800">
                                {{ item.titulo }}
                            </h3>
                            <p class="texto-pequeño text-zinc-500">
                                {{ item.descripcion }}
                            </p>
                        </div>
                        <i
                            class="fas fa-arrow-right text-zinc-400 group-hover:text-blue-600 group-hover:translate-x-1 transition-all"></i>
                    </div>
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl p-6 shadow-md border border-zinc-200">
                <div class="flex items-center gap-3 mb-4">
                    <i class="fas fa-calendar-alt text-blue-600 text-xl"></i>
                    <h3 class="texto-normal font-semibold text-zinc-800">Fecha Actual</h3>
                </div>
                <p class="texto-intermedio font-semibold text-zinc-700">{{ fechaActual }}</p>
                <p class="texto-chico text-zinc-500 mt-2">{{ horaActual }}</p>
            </div>

            <div class="bg-white rounded-xl p-6 shadow-md border border-zinc-200">
                <div class="flex items-center gap-3 mb-4">
                    <i class="fas fa-circle text-green-500 animate-pulse"></i>
                    <h3 class="texto-normal font-semibold text-zinc-800">Estado del Sistema</h3>
                </div>
                <p class="texto-pequeño text-green-600 font-medium">Todos los servicios operando correctamente</p>
                <p class="texto-chico text-zinc-500 mt-2">Última actualización: {{ horaActual }}</p>
            </div>
        </div>
    </div>
</div>
